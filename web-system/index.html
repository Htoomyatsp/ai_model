<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web System Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <h1>Web System Dashboard</h1>
        <p>Manage tasks directly in your browser.</p>
      </header>

      <section class="card">
        <h2>Create Task</h2>
        <form id="task-form" class="task-form">
          <input id="task-title" type="text" placeholder="Task title" required />
          <input id="task-owner" type="text" placeholder="Owner" required />
          <button type="submit">Add Task</button>
        </form>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Task List</h2>
          <button id="clear-all" class="danger">Clear All</button>
        </div>
        <ul id="task-list" class="task-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
